<!doctype html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Kiểm thử Phần mềm — CS03045</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #f5f4f0;
            --surface: #ffffff;
            --surface2: #f0ede8;
            --border: rgba(0, 0, 0, 0.1);
            --border2: rgba(0, 0, 0, 0.18);
            --text: #1a1a18;
            --text2: #6b6860;
            --text3: #a8a49e;
            --green: #2d7a4f;
            --green-bg: #e8f5ee;
            --red: #a33030;
            --red-bg: #fbeaea;
            --accent: #3d6b9e;
            --accent-bg: #e8f0f8;
            --progress: #2d7a4f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Be Vietnam Pro", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        .wrap {
            max-width: 760px;
            margin: 0 auto;
            padding: 2rem 1.25rem;
        }

        /* HOME */
        .home-header {
            margin-bottom: 2rem;
        }

        .home-title {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .home-sub {
            font-size: 14px;
            color: var(--text2);
        }

        .chapters {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 12px;
        }

        .chap-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.1rem 1.25rem;
            cursor: pointer;
            transition:
                border-color 0.15s,
                transform 0.15s,
                box-shadow 0.15s;
        }

        .chap-card:hover {
            border-color: var(--border2);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.07);
        }

        .chap-num {
            font-size: 11px;
            color: var(--text3);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .chap-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 5px;
            line-height: 1.4;
        }

        .chap-meta {
            font-size: 12px;
            color: var(--text2);
            margin-bottom: 10px;
        }

        .badge {
            display: inline-block;
            padding: 3px 9px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }

        .badge-pass {
            background: var(--green-bg);
            color: var(--green);
        }

        .badge-fail {
            background: var(--red-bg);
            color: var(--red);
        }

        .badge-new {
            background: var(--surface2);
            color: var(--text2);
        }

        /* QUIZ */
        .quiz-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .back-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 7px 13px;
            font-size: 13px;
            cursor: pointer;
            color: var(--text);
            font-family: inherit;
            transition: background 0.12s;
        }

        .back-btn:hover {
            background: var(--surface2);
        }

        .quiz-title {
            font-size: 15px;
            font-weight: 600;
            flex: 1;
            min-width: 80px;
        }

        .progress-wrap {
            background: var(--surface2);
            border-radius: 99px;
            height: 5px;
            width: 110px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--progress);
            border-radius: 99px;
            transition: width 0.35s;
        }

        .q-counter {
            font-size: 12px;
            color: var(--text3);
            font-family: "JetBrains Mono", monospace;
        }

        .qbox {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.4rem 1.5rem;
            margin-bottom: 1rem;
        }

        .q-num {
            font-size: 11px;
            color: var(--text3);
            margin-bottom: 8px;
            font-family: "JetBrains Mono", monospace;
        }

        .q-text {
            font-size: 15px;
            line-height: 1.65;
        }

        .opts {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 1.1rem;
        }

        .opt-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 15px;
            text-align: left;
            cursor: pointer;
            font-size: 13.5px;
            color: var(--text);
            font-family: inherit;
            transition: all 0.12s;
            line-height: 1.5;
        }

        .opt-btn:hover:not(:disabled) {
            border-color: var(--border2);
            background: var(--surface2);
        }

        .opt-btn.correct {
            background: var(--green-bg);
            border-color: #2d7a4f;
            color: var(--green);
        }

        .opt-btn.wrong {
            background: var(--red-bg);
            border-color: #a33030;
            color: var(--red);
        }

        .explain {
            background: var(--surface);
            border-left: 3px solid var(--green);
            padding: 12px 16px;
            font-size: 13px;
            color: var(--text2);
            line-height: 1.65;
            margin-bottom: 1rem;
            border-radius: 0 10px 10px 0;
        }

        .next-btn {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 10px;
            padding: 10px 20px;
            font-size: 13.5px;
            cursor: pointer;
            color: var(--text);
            font-family: inherit;
            transition: background 0.12s;
        }

        .next-btn:hover {
            background: var(--surface2);
        }

        /* RESULT */
        .result-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            text-align: center;
        }

        .result-score {
            font-size: 56px;
            font-weight: 600;
            letter-spacing: -2px;
        }

        .result-label {
            font-size: 13px;
            color: var(--text2);
            margin-bottom: 1.5rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--surface2);
            border-radius: 10px;
            padding: 0.75rem;
            text-align: center;
        }

        .stat-n {
            font-size: 24px;
            font-weight: 600;
        }

        .stat-l {
            font-size: 11px;
            color: var(--text2);
            margin-top: 2px;
        }

        .result-msg {
            font-size: 14px;
            margin-bottom: 1.5rem;
        }

        .btn-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div id="app"></div>
    </div>
    <script>
        const CHAPTERS = [
            {
                id: 1,
                name: "Tổng quan kiểm thử",
                desc: "Khái niệm, nguyên tắc, vai trò",
                questions: [
                    {
                        q: "Theo Glen Myers, kiểm thử phần mềm là gì?",
                        o: [
                            "Quá trình đảm bảo phần mềm không có lỗi",
                            "Quá trình thực thi chương trình với mục đích tìm ra lỗi",
                            "Quá trình viết tài liệu phần mềm",
                            "Quá trình sửa lỗi phần mềm",
                        ],
                        a: 1,
                        e: "Glen Myers định nghĩa: kiểm thử là quá trình thực thi chương trình nhằm mục đích tìm ra lỗi.",
                    },
                    {
                        q: "Theo ANSI/IEEE 1059, kiểm thử phần mềm là gì?",
                        o: [
                            "Quy trình phân tích PM để tìm sự khác biệt giữa điều kiện hiện có và điều kiện bắt buộc",
                            "Quy trình viết code không có lỗi",
                            "Quy trình đào tạo lập trình viên",
                            "Quy trình triển khai phần mềm",
                        ],
                        a: 0,
                        e: "ANSI/IEEE 1059: quy trình phân tích PM để tìm sự khác biệt giữa điều kiện hiện có và điều kiện bắt buộc, đồng thời đánh giá tính năng PM.",
                    },
                    {
                        q: "Phát biểu nào của Dijkstra về kiểm thử là đúng?",
                        o: [
                            "KT có thể chứng minh PM hoàn toàn không có lỗi",
                            "KT chỉ ra sự hiện diện của lỗi nhưng không thể chỉ ra sự vắng mặt của lỗi",
                            "KT là bước cuối trong phát triển PM",
                            "KT chỉ do tester thực hiện",
                        ],
                        a: 1,
                        e: "Dijkstra: KT giúp tìm ra sự hiện diện của lỗi nhưng không thể chứng minh PM hoàn toàn không có lỗi.",
                    },
                    {
                        q: "Theo Beizer, điều gì xảy ra sau khi áp dụng các phương pháp kiểm thử?",
                        o: [
                            "PM không còn lỗi",
                            "Mọi lỗi đều được tìm thấy",
                            "Luôn sót lại những lỗi khó phát hiện hơn",
                            "Chi phí kiểm thử giảm về 0",
                        ],
                        a: 2,
                        e: "Beizer: Mọi phương pháp KT đều sót lại những lỗi khó phát hiện hơn — đây là bản chất không thể tránh khỏi.",
                    },
                    {
                        q: "Theo thống kê, lập trình viên giỏi trung bình có bao nhiêu lỗi trên 100 dòng lệnh?",
                        o: ["0 lỗi", "1-3 lỗi", "10-20 lỗi", "50 lỗi"],
                        a: 1,
                        e: "Theo Boris Beizer: ngay cả lập trình viên giỏi cũng có trung bình 1-3 lỗi trên 100 dòng lệnh.",
                    },
                    {
                        q: "Việc kiểm tra để tìm lỗi chiếm bao nhiêu phần trăm khối lượng công việc phát triển PM?",
                        o: ["10%", "25%", "50%", "75%"],
                        a: 2,
                        e: "Theo tài liệu: việc kiểm tra để tìm ra các lỗi chiếm phân nửa (50%) khối lượng công việc phải làm.",
                    },
                    {
                        q: "Test và Debug khác nhau ở điểm nào?",
                        o: [
                            "Test tìm nguyên nhân lỗi, Debug tìm khiếm khuyết",
                            "Test tìm khiếm khuyết, Debug tìm nguyên nhân lỗi",
                            "Test do developer làm, Debug do tester làm",
                            "Không có sự khác biệt",
                        ],
                        a: 1,
                        e: "Test: tìm khiếm khuyết (thường do tester). Debug: tìm nguyên nhân và sửa lỗi (thường do developer).",
                    },
                    {
                        q: "Kiểm thử bao nhiêu là đủ phụ thuộc vào các yếu tố nào?",
                        o: [
                            "Tính quan trọng của PM, độ bao phủ, thời gian, ngân sách",
                            "Số lượng lập trình viên",
                            "Kích thước file PM",
                            "Ngôn ngữ lập trình",
                        ],
                        a: 0,
                        e: "Kiểm thử bao nhiêu là đủ dựa vào: tính quan trọng của PM, độ bao phủ code/chức năng, thời gian và ngân sách.",
                    },
                    {
                        q: "Nguyên tắc 'Pesticide paradox' nghĩa là gì?",
                        o: [
                            "Dùng quá nhiều thuốc trừ sâu trong nông nghiệp",
                            "Nếu cùng test case được lặp lại nhiều lần sẽ không tìm thêm lỗi mới",
                            "KT càng nhiều càng tốt",
                            "Lỗi tập trung ở một vài module",
                        ],
                        a: 1,
                        e: "Pesticide paradox: nếu cùng bộ test case được lặp lại nhiều lần, chúng sẽ không tìm ra lỗi mới. Cần liên tục cập nhật và bổ sung test case.",
                    },
                    {
                        q: "'Error' trong kiểm thử phần mềm là gì?",
                        o: [
                            "Lỗi xuất hiện khi chạy chương trình",
                            "Sự nhầm lẫn hay hiểu sai của developer trong quá trình phát triển",
                            "Kết quả sai của chương trình",
                            "Lỗi phần cứng",
                        ],
                        a: 1,
                        e: "Error: sự nhầm lẫn hay hiểu sai của developer trong quá trình phát triển PM (lỗi của con người).",
                    },
                    {
                        q: "'Fault' hay 'Defect' là gì?",
                        o: [
                            "Lỗi xuất hiện trong PM là kết quả của một sai sót (error)",
                            "Lỗi của người dùng",
                            "Lỗi phần cứng",
                            "Lỗi mạng",
                        ],
                        a: 0,
                        e: "Fault/Defect: xuất hiện trong phần mềm như là kết quả của một sai sót (error). Defect là sự thể hiện của fault.",
                    },
                    {
                        q: "'Failure' trong kiểm thử là gì?",
                        o: [
                            "Sự nhầm lẫn của developer",
                            "Kết quả của lỗi làm chương trình không hoạt động hoặc cho kết quả sai",
                            "Thiếu tài liệu kiểm thử",
                            "Môi trường kiểm thử lỗi",
                        ],
                        a: 1,
                        e: "Failure: kết quả của một lỗi làm cho chương trình không hoạt động được hay hoạt động nhưng cho kết quả không như mong đợi.",
                    },
                    {
                        q: "'Verification' (xác minh) quan tâm đến điều gì?",
                        o: [
                            "Sản phẩm cuối cùng đúng theo yêu cầu KH",
                            "Ngăn chặn lỗi giữa các công đoạn phát triển",
                            "Chỉ kiểm tra giao diện",
                            "Kiểm tra hiệu năng",
                        ],
                        a: 1,
                        e: "Verification: quy trình xác định sản phẩm của một công đoạn có thỏa mãn yêu cầu của công đoạn trước không. Quan tâm đến việc ngăn chặn lỗi.",
                    },
                    {
                        q: "'Validation' (xác nhận) tập trung vào điều gì?",
                        o: [
                            "Ngăn chặn lỗi giữa các giai đoạn",
                            "Chỉ quan tâm đến sản phẩm cuối cùng — có đúng yêu cầu KH không",
                            "Kiểm tra từng module riêng lẻ",
                            "Kiểm tra code style",
                        ],
                        a: 1,
                        e: "Validation: tiến trình chỉ ra toàn bộ hệ thống đã hoàn thành phù hợp yêu cầu KH. Chỉ quan tâm đến sản phẩm cuối cùng.",
                    },
                    {
                        q: "'Test oracle' là gì?",
                        o: [
                            "Công cụ tạo test case tự động",
                            "Phương pháp hoặc công cụ xác định kết quả test case có chính xác không",
                            "Cơ sở dữ liệu test",
                            "Môi trường chạy test",
                        ],
                        a: 1,
                        e: "Test oracle: phương pháp hoặc công cụ dùng để xác định kết quả của một test case có chính xác hay không (tự động hoặc thủ công).",
                    },
                    {
                        q: "Mục tiêu chung của kiểm thử theo khía cạnh tâm lý học là gì?",
                        o: [
                            "Chứng minh developer sai",
                            "Giúp hệ thống đạt chất lượng tốt hơn",
                            "Tạo áp lực cho dev team",
                            "Trì hoãn dự án",
                        ],
                        a: 1,
                        e: "Theo khía cạnh tâm lý học: mục tiêu chung là giúp hệ thống đạt chất lượng tốt hơn, không phải để 'phá hoại' hay tạo thù địch cá nhân.",
                    },
                    {
                        q: "'Tính độc lập' trong kiểm thử tâm lý học nghĩa là gì?",
                        o: [
                            "Tester làm việc độc lập, không cần trao đổi",
                            "Tester khách quan, không bị ảnh hưởng bởi người viết code",
                            "Tester tự viết code và test",
                            "Tester không cần báo cáo",
                        ],
                        a: 1,
                        e: "Tính độc lập trong KT: tester cần khách quan, tập trung vào thực tế, không có sự thù ghét cá nhân với developer.",
                    },
                    {
                        q: "Hoạt động nào KHÔNG thuộc các hoạt động kiểm thử cơ bản?",
                        o: [
                            "Lên kế hoạch và xử lý",
                            "Thiết kế test case",
                            "Viết code mới cho PM",
                            "Đánh giá tiêu chuẩn hoàn thành",
                        ],
                        a: 2,
                        e: "Viết code mới là hoạt động phát triển, không phải kiểm thử. Các hoạt động KT: lên kế hoạch, thiết kế TC, kiểm tra kết quả, đánh giá, báo cáo.",
                    },
                    {
                        q: "Nguyên tắc 'KT phụ thuộc vào ngữ cảnh' nghĩa là gì?",
                        o: [
                            "Chỉ KT vào buổi sáng",
                            "Phương pháp KT phù hợp khác nhau tùy loại PM và dự án",
                            "KT chỉ dùng một công cụ cố định",
                            "KT không thay đổi theo thời gian",
                        ],
                        a: 1,
                        e: "KT phụ thuộc vào ngữ cảnh: KT PM điều khiển máy bay khác với KT web thương mại điện tử — phương pháp phải phù hợp với từng loại dự án.",
                    },
                    {
                        q: "'Test data' (dữ liệu thử) là gì?",
                        o: [
                            "Kết quả đầu ra mong đợi",
                            "Dữ liệu vào cần cung cấp cho PM trong khi thực thi",
                            "Báo cáo kiểm thử",
                            "Tài liệu đặc tả",
                        ],
                        a: 1,
                        e: "Test data: dữ liệu vào (input) cần cung cấp cho PM trong quá trình thực thi test case.",
                    },
                    {
                        q: "'Test scenario' (kịch bản kiểm thử) là gì?",
                        o: [
                            "Một test case cụ thể",
                            "Mô tả tổng quát về một tình huống kiểm thử cần thực hiện",
                            "Báo cáo lỗi",
                            "Môi trường kiểm thử",
                        ],
                        a: 1,
                        e: "Test scenario: mô tả tổng quát về một tình huống KT cần thực hiện. Đầu vào là test plan, là cơ sở để thiết kế test case.",
                    },
                    {
                        q: "Nguyên tắc 'sự tập trung của các lỗi' nghĩa là gì?",
                        o: [
                            "Tất cả module có số lỗi bằng nhau",
                            "Lỗi thường tập trung ở một số ít module",
                            "Lỗi phân bổ đều khắp PM",
                            "Không thể dự đoán lỗi tập trung ở đâu",
                        ],
                        a: 1,
                        e: "Nguyên tắc 80/20: phần lớn lỗi thường tập trung ở một số ít module. Nên tập trung KT kỹ hơn vào các module có nguy cơ cao.",
                    },
                    {
                        q: "Nguyên tắc 'KT toàn bộ là không thể' nghĩa là gì?",
                        o: [
                            "Chỉ cần kiểm thử một phần",
                            "Không thể kiểm thử toàn bộ mọi tổ hợp đầu vào có thể",
                            "Không cần kiểm thử",
                            "Chỉ developer mới kiểm thử được",
                        ],
                        a: 1,
                        e: "Exhaustive testing là không thể thực hiện vì số lượng tổ hợp đầu vào là vô hạn. Cần chiến lược KT thông minh để tối ưu độ bao phủ.",
                    },
                    {

                        e: "Bảng hỗ trợ quyết định (Decision Table) hiệu quả nhất cho logic nghiệp vụ phức tạp với nhiều điều kiện — đảm bảo mọi tổ hợp điều kiện đều được test.",
                    },
                    {
                        q: "Trong KT hộp trắng, sau khi tính V(G)=4, cần ít nhất bao nhiêu test case?",

                        a: 2,
                        e: "V(G) = số đường thi hành tuyến tính độc lập = số test case TỐI THIỂU cần thiết. V(G)=4 → cần ít nhất 4 test case để phủ toàn bộ đường thi hành.",
                    },
                    {
                        q: "Phương pháp KT nào phù hợp nhất khi tester không có quyền truy cập source code?",

                    },
                    {
                        q: "Phương pháp KT nào phù hợp nhất khi cần đảm bảo mọi dòng code đều được thực thi?",
                        o: [
                            "KT hộp đen",
                            "KT hộp xám",
                            "KT hộp trắng",
                            "Phân vùng tương đương",
                        ],
                        a: 2,
                        e: "KT hộp trắng phù hợp nhất để đảm bảo code coverage — nó trực tiếp dựa trên cấu trúc code để thiết kế TC đảm bảo mọi lệnh, nhánh được thực thi.",
                    },
                    {
                        q: "'Worst-Cases + Robustness BV' là gì?",
                        o: [
                            "Chỉ test worst case",
                            "Tổ hợp worst-cases với cả giá trị ngoài miền hợp lệ — số test case nhiều nhất",
                            "Test case ngẫu nhiên",
                            "Giống Normal BV",
                        ],
                        a: 1,
                        e: "Worst-Cases + Robustness BV: kết hợp worst-cases (tổ hợp tất cả giá trị biên) với robustness (thêm giá trị ngoài miền) — số lượng test case lớn nhất nhưng bao phủ toàn diện nhất.",
                    },
                    {
                        q: "Điểm mạnh của 'Phân tích giá trị biên' so với phân vùng tương đương là gì?",
                        o: [
                            "Ít test case hơn",
                            "Phát hiện lỗi off-by-one và lỗi điều kiện biên mà EC bỏ qua",
                            "Dễ áp dụng hơn",
                            "Không cần đặc tả",
                        ],
                        a: 1,
                        e: "BVA mạnh hơn EC ở chỗ: phát hiện lỗi tại ranh giới miền (off-by-one, sai điều kiện biên) — những lỗi rất phổ biến mà EC không kiểm tra.",
                    },
                    {
                        q: "Kỹ thuật EC (Equivalence Class) giúp giảm số lượng test case bằng cách nào?",
                        o: [
                            "Xóa bớt test case",
                            "Thay vì test mọi giá trị, chỉ cần test 1 đại diện của mỗi lớp — các giá trị trong cùng lớp cho kết quả tương tự",
                            "Chỉ test happy path",
                            "Dùng AI để giảm",
                        ],
                        a: 1,
                        e: "EC giảm số TC bằng cách: thay vì test mọi giá trị trong một miền, chỉ cần test 1 đại diện — vì tất cả giá trị trong cùng lớp tương đương sẽ cho kết quả tương tự.",
                    },
                    {
                        q: "Khi áp dụng EC, có bao nhiêu loại kết hợp input chính?",
                        o: ["2", "3", "4", "5"],
                        a: 2,
                        e: "Có 4 loại kết hợp input khi áp dụng EC: Weak Normal EC, Strong Normal EC, Weak Robust EC, Strong Robust EC.",
                    },
                    {
                        q: "Phân tích giá trị biên có bao nhiêu loại kết hợp input chính?",
                        o: ["2", "3", "4", "5"],
                        a: 2,
                        e: "Có 4 loại khi áp dụng BVA: Normal BV, Robustness BV, Worst-Cases BV, Worst-Cases + Robustness BV.",
                    },
                    {
                        q: "Sự kết hợp EC và BVA trong thực tế mang lại lợi ích gì?",
                        o: [
                            "Không có lợi ích gì thêm",
                            "EC giảm số lớp, BVA kiểm tra biên của mỗi lớp — kết hợp cho độ bao phủ cao hơn với ít test case hơn",
                            "Làm tăng số test case",
                            "Chỉ cần dùng một trong hai",
                        ],
                        a: 1,
                        e: "EC + BVA bổ sung cho nhau: EC phân vùng miền đầu vào, BVA kiểm tra giá trị tại ranh giới mỗi phân vùng — kết hợp này bao phủ toàn diện hơn mỗi kỹ thuật riêng lẻ.",
                    },
                    {
                        q: "Tại sao KT hộp trắng cần developer tham gia?",
                        o: [
                            "Để tiết kiệm tiền",
                            "Vì developer hiểu cấu trúc code, có thể thiết kế TC bao phủ đường thi hành hiệu quả hơn",
                            "Để có thêm người test",
                            "Để debug nhanh hơn",
                        ],
                        a: 1,
                        e: "KT hộp trắng cần developer vì: họ biết cấu trúc code bên trong, hiểu các đường thi hành quan trọng, và có thể thiết kế TC phủ các trường hợp đặc biệt hiệu quả hơn.",
                    },
                    {
                        q: "Điểm yếu của KT hộp trắng là gì?",
                        o: [
                            "Không bao giờ tìm thấy lỗi",
                            "Không kiểm tra xem PM có đáp ứng yêu cầu người dùng không — chỉ kiểm tra code đúng thiết kế",
                            "Quá đơn giản",
                            "Không cần tool",
                        ],
                        a: 1,
                        e: "KT hộp trắng điểm yếu: kiểm tra code có đúng thiết kế nhưng không đảm bảo PM đáp ứng yêu cầu thực tế của người dùng — đó là lý do cần kết hợp với hộp đen.",
                    },
                    {
                        q: "Điểm yếu của KT hộp đen là gì?",
                        o: [
                            "Không test giao diện được",
                            "Không kiểm tra bên trong code nên có thể bỏ sót lỗi logic và dead code",
                            "Cần source code",
                            "Quá chậm",
                        ],
                        a: 1,
                        e: "KT hộp đen điểm yếu: không thấy bên trong code nên có thể bỏ sót lỗi logic, dead code, hoặc các đường thi hành ít được sử dụng.",
                    },
                    {
                        q: "Tại sao cần kết hợp nhiều kỹ thuật KT hộp đen?",
                        o: [
                            "Để tốn nhiều thời gian hơn",
                            "Mỗi kỹ thuật phát hiện loại lỗi khác nhau — kết hợp cho độ bao phủ toàn diện hơn",
                            "Để có nhiều tài liệu hơn",
                            "Để chứng minh test kỹ",
                        ],
                        a: 1,
                        e: "Kết hợp EC + BVA + Decision Table: EC phân vùng miền, BVA kiểm tra biên, Decision Table kiểm tra logic phức tạp — cùng nhau bao phủ các loại lỗi khác nhau.",
                    },
                ],
            },
        ];

        let state = {
            view: "home",
            chapIdx: 0,
            qIdx: 0,
            sel: null,
            answered: false,
            scores: {},
            correct: 0,
        };

        function render() {
            const app = document.getElementById("app");
            if (state.view === "home") app.innerHTML = renderHome();
            else if (state.view === "quiz") app.innerHTML = renderQuiz();
            else if (state.view === "result") app.innerHTML = renderResult();
            bind();
        }

        function renderHome() {
            const cards = CHAPTERS.map((ch, i) => {
                const sc = state.scores[ch.id];
                const badge =
                    sc !== undefined
                        ? `<span class="badge ${sc >= 70 ? "badge-pass" : "badge-fail"}">${sc}% — ${sc >= 70 ? "Đạt" : "Ôn lại"}</span>`
                        : `<span class="badge badge-new">Chưa làm</span>`;
                return `<div class="chap-card" data-c="${i}">
      <div class="chap-num">Chương ${ch.id}</div>
      <div class="chap-name">${ch.name}</div>
      <div class="chap-meta">${ch.desc} · 50 câu</div>
      <div style="margin-top:10px">${badge}</div>
    </div>`;
            }).join("");
            return `<div class="home-header">
    <div class="home-title">Kiểm thử Phần mềm</div>
    <div class="home-sub">CS03045 · 4 chương · 50 câu mỗi chương — chọn chương để ôn tập</div>
  </div>
  <div class="chapters">${cards}</div>`;
        }

        function renderQuiz() {
            const ch = CHAPTERS[state.chapIdx];
            const q = ch.questions[state.qIdx];
            const prog = Math.round((state.qIdx / ch.questions.length) * 100);
            const opts = q.o
                .map((opt, i) => {
                    let cls = "opt-btn";
                    if (state.answered) {
                        if (i === q.a) cls += " correct";
                        else if (i === state.sel) cls += " wrong";
                    }
                    return `<button class="${cls}" data-o="${i}" ${state.answered ? "disabled" : ""}>${opt}</button>`;
                })
                .join("");
            const exp = state.answered ? `<div class="explain">${q.e}</div>` : "";
            const isLast = state.qIdx === ch.questions.length - 1;
            const nxt = state.answered
                ? `<button class="next-btn" id="nxt">${isLast ? "Xem kết quả →" : "Câu tiếp →"}</button>`
                : "";
            return `<div class="quiz-header">
    <button class="back-btn" id="back">← Trang chủ</button>
    <span class="quiz-title">${ch.name}</span>
    <div class="progress-wrap"><div class="progress-fill" style="width:${prog}%"></div></div>
    <span class="q-counter">${state.qIdx + 1}/${ch.questions.length}</span>
  </div>
  <div class="qbox">
    <div class="q-num">Câu ${state.qIdx + 1}</div>
    <div class="q-text">${q.q}</div>
  </div>
  <div class="opts">${opts}</div>
  ${exp}${nxt}`;
        }

        function renderResult() {
            const ch = CHAPTERS[state.chapIdx];
            const sc = state.scores[ch.id];
            const pass = sc >= 70;
            const wrong = ch.questions.length - state.correct;
            return `<div class="result-box">
    <div class="result-score">${sc}%</div>
    <div class="result-label">${ch.name} — ${pass ? "Đạt (≥70%)" : "Chưa đạt (<70%)"}</div>
    <div class="stats">
      <div class="stat-card"><div class="stat-n">${ch.questions.length}</div><div class="stat-l">Tổng câu</div></div>
      <div class="stat-card"><div class="stat-n" style="color:var(--green)">${state.correct}</div><div class="stat-l">Đúng</div></div>
      <div class="stat-card"><div class="stat-n" style="color:var(--red)">${wrong}</div><div class="stat-l">Sai</div></div>
    </div>
    <div class="result-msg">${pass ? "🎉 Xuất sắc! Bạn đã nắm vững chương này." : "💪 Cần ôn thêm! Xem lại lý thuyết rồi thử lại."}</div>
    <div class="btn-row">
      <button class="next-btn" id="retry">Làm lại</button>
      <button class="next-btn" id="home2">Về trang chủ</button>
    </div>
  </div>`;
        }

        function bind() {
            document.querySelectorAll(".chap-card").forEach((c) => {
                c.addEventListener("click", () => {
                    state.chapIdx = parseInt(c.dataset.c);
                    state.qIdx = 0;
                    state.sel = null;
                    state.answered = false;
                    state.correct = 0;
                    state.view = "quiz";
                    render();
                });
            });
            document.querySelectorAll(".opt-btn").forEach((b) => {
                b.addEventListener("click", () => {
                    if (state.answered) return;
                    const q = CHAPTERS[state.chapIdx].questions[state.qIdx];
                    state.sel = parseInt(b.dataset.o);
                    state.answered = true;
                    if (state.sel === q.a) state.correct++;
                    render();
                });
            });
            const nxt = document.getElementById("nxt");
            if (nxt)
                nxt.addEventListener("click", () => {
                    const ch = CHAPTERS[state.chapIdx];
                    if (state.qIdx < ch.questions.length - 1) {
                        state.qIdx++;
                        state.sel = null;
                        state.answered = false;
                        render();
                    } else {
                        state.scores[ch.id] = Math.round(
                            (state.correct / ch.questions.length) * 100,
                        );
                        state.view = "result";
                        render();
                    }
                });
            const back = document.getElementById("back");
            if (back)
                back.addEventListener("click", () => {
                    state.view = "home";
                    render();
                });
            const retry = document.getElementById("retry");
            if (retry)
                retry.addEventListener("click", () => {
                    state.qIdx = 0;
                    state.sel = null;
                    state.answered = false;
                    state.correct = 0;
                    state.view = "quiz";
                    render();
                });
            const home2 = document.getElementById("home2");
            if (home2)
                home2.addEventListener("click", () => {
                    state.view = "home";
                    render();
                });
        }

        render();
    </script>
</body>
